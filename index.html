<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mahi 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="stars"></canvas>
<div id="startScreen" style="display:none;">
    <button id="startBtn">Tap to Start 💖</button>
</div>

<div class="container">

    <h1 class="title" id="mainTitle">Wait for it... 💕</h1>

    <div id="countdown"></div>

    <div id="lockScreen">
        <p>Not yet... ⏳</p>
    </div>

    <div id="flash"></div>

    <!-- SECRET -->
    <div id="secretContent" class="hidden">

        <h2 class="glow">Happy Birthday Mahi ❤️</h2>

        <div class="paper">
            <p id="typingText"></p>
        </div>

    </div>

    <!-- MEMORIES -->
    <div id="memories" class="hidden">

        <h2 class="glow">Our Memories 💖</h2>

        <div class="memory">
            <img src="images/1.jpeg">
            <p>Birthday</p>
        </div>

        <div class="memory">
            <img src="images/3.jpeg">
            <p>The Trip</p>
        </div>
        <div class="memory">
            <img src="images/4.jpeg">
            <p>FEST</p>
        </div>
        <div class="memory">
            <img src="images/5.jpeg">
            <p>Station</p>
        </div>
        <div class="memory">
            <img src="images/6.jpeg">
            <p>Hehehe</p>
        </div>
        <div class="memory">
            <img src="images/2.jpeg">
            <p>Forever memory</p>
        </div>

    </div>

</div>

<audio id="music" src="music/music.mpeg"></audio>

<script src="script.js"></script>
</body>
</html>
